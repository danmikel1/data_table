<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Data Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: #2b2f32;
        }
        
        .header-title {
            font-weight: 600;
            color: #1a1d20;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        .action-card {
            display: none;
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .table-container {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .table {
            margin-bottom: 0;
            vertical-align: middle;
        }

        .table thead th {
            background-color: #f8f9fa;
            color: #6c757d;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 2px solid #e9ecef;
            padding: 16px;
        }

        .table tbody td {
            padding: 16px;
            border-bottom: 1px solid #f1f3f5;
            font-size: 0.9rem;
        }

        .table tbody tr {
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .table tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.002);
        }

        .id-badge {
            background-color: #e9ecef;
            color: #495057;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .btn-custom {
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 6px 12px;
            transition: all 0.2s ease;
        }

        .btn-custom:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 10px 14px;
            font-size: 0.9rem;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
            border-color: #86b7fe;
        }
    </style>
</head>
<body class="container py-5">

    <h2 class="header-title">User Management</h2>

    <div id="editFormContainer" class="action-card">
        <h5 class="mb-4 text-primary" style="font-weight: 600;">Edit User Record</h5>
        <input type="hidden" id="editId">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label text-muted small fw-bold">NAME</label>
                <input type="text" id="editName" class="form-control" placeholder="Enter full name">
            </div>
            <div class="col-md-4">
                <label class="form-label text-muted small fw-bold">USERNAME</label>
                <input type="text" id="editUsername" class="form-control" placeholder="Enter username">
            </div>
            <div class="col-md-4">
                <label class="form-label text-muted small fw-bold">EMAIL</label>
                <input type="email" id="editEmail" class="form-control" placeholder="Enter email address">
            </div>
        </div>
        <div class="mt-4">
            <button class="btn btn-primary btn-custom px-4 me-2" onclick="saveEdit()">Save Changes</button>
            <button class="btn btn-light btn-custom text-dark border px-4" onclick="cancelEdit()">Cancel</button>
        </div>
    </div>

    <div class="table-container">
        <table class="table table-borderless">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th class="text-end">Actions</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
            </tbody>
        </table>
    </div>

    <script>
        const apiUrl = 'https://jsonplaceholder.typicode.com/users/';
        let usersArray = [];

        async function fetchUsers() {
            try {
                const response = await fetch(apiUrl);
                usersArray = await response.json();
                renderTable();
            } catch (error) {
                console.error('Data fetch failure:', error);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            usersArray.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="id-badge">#${user.id}</span></td>
                    <td class="fw-medium">${user.name}</td>
                    <td class="text-muted">@${user.username}</td>
                    <td>${user.email}</td>
                    <td class="text-end">
                        <button class="btn btn-outline-primary btn-custom me-2" onclick="editUser(${user.id})">Edit</button>
                        <button class="btn btn-outline-danger btn-custom" onclick="deleteUser(${user.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteUser(id) {
            usersArray = usersArray.filter(user => user.id !== id);
            renderTable();
        }

        function editUser(id) {
            const user = usersArray.find(u => u.id === id);
            if (!user) return;

            document.getElementById('editId').value = user.id;
            document.getElementById('editName').value = user.name;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editEmail').value = user.email;

            document.getElementById('editFormContainer').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveEdit() {
            const id = parseInt(document.getElementById('editId').value);
            const index = usersArray.findIndex(u => u.id === id);

            if (index !== -1) {
                usersArray[index].name = document.getElementById('editName').value;
                usersArray[index].username = document.getElementById('editUsername').value;
                usersArray[index].email = document.getElementById('editEmail').value;

                renderTable();
                cancelEdit();
            }
        }

        function cancelEdit() {
            document.getElementById('editFormContainer').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>
</html>
