<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Data Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #editFormContainer {
            display: none;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="container mt-4">

    <h2>User Management</h2>

    <div id="editFormContainer">
        <h4>Edit User</h4>
        <input type="hidden" id="editId">
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" id="editName" class="form-control" placeholder="Name">
            </div>
            <div class="col-md-4">
                <input type="text" id="editUsername" class="form-control" placeholder="Username">
            </div>
            <div class="col-md-4">
                <input type="email" id="editEmail" class="form-control" placeholder="Email">
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-success" onclick="saveEdit()">Save</button>
            <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
        </div>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
        </tbody>
    </table>

    <script>
        const apiUrl = 'https://jsonplaceholder.typicode.com/users/';
        let usersArray = [];

        async function fetchUsers() {
            try {
                const response = await fetch(apiUrl);
                usersArray = await response.json();
                renderTable();
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            usersArray.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editUser(${user.id})">EDIT</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">DELETE</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteUser(id) {
            usersArray = usersArray.filter(user => user.id !== id);
            renderTable();
        }

        function editUser(id) {
            const user = usersArray.find(u => u.id === id);
            if (!user) return;

            document.getElementById('editId').value = user.id;
            document.getElementById('editName').value = user.name;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editEmail').value = user.email;

            document.getElementById('editFormContainer').style.display = 'block';
        }

        function saveEdit() {
            const id = parseInt(document.getElementById('editId').value);
            const index = usersArray.findIndex(u => u.id === id);

            if (index !== -1) {
                usersArray[index].name = document.getElementById('editName').value;
                usersArray[index].username = document.getElementById('editUsername').value;
                usersArray[index].email = document.getElementById('editEmail').value;

                renderTable();
                cancelEdit();
            }
        }

        function cancelEdit() {
            document.getElementById('editFormContainer').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>
</html>
